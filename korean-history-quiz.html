<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>한국사 개념완성 · 2026-2 지필평가</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700;800&family=Noto+Sans+KR:wght@400;500;700;900&display=swap');

:root{
  --paper:#eef1e6; --paper-card:#f7f8f1; --ink:#20241f; --ink-soft:#5c6457;
  --teal:#1d6b63; --teal-deep:#123f3a; --vermilion:#b8442c; --vermilion-deep:#8c3220;
  --ochre:#c98a2a; --ochre-soft:rgba(201,138,42,.24); --line:rgba(32,36,31,.14);
  --good:#2f7a4f; --bad:#b8442c; --A:#8a6a3f; --B:#1d6b63; --C:#b8442c;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;background:var(--paper);color:var(--ink);}
body{font-family:'Noto Sans KR',sans-serif;-webkit-tap-highlight-color:transparent;overscroll-behavior-y:none;}
h1,h2,h3,h4{font-family:'Nanum Myeongjo',serif;margin:0;line-height:1.3;}
button{font-family:inherit;}
#app{max-width:560px;margin:0 auto;min-height:100vh;background:var(--paper);position:relative;padding-bottom:36px;}

.topbar{position:sticky;top:0;z-index:30;background:linear-gradient(180deg,var(--paper) 80%, rgba(238,241,230,0));padding:10px 16px 4px;display:flex;align-items:center;gap:10px;min-height:46px;}
.backbtn{border:1.5px solid var(--ink);background:var(--paper-card);color:var(--ink);border-radius:50%;width:34px;height:34px;display:flex;align-items:center;justify-content:center;font-size:18px;cursor:pointer;flex:0 0 auto;}
.topbar .tb-title{font-size:14px;color:var(--ink-soft);font-weight:500;letter-spacing:.02em;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}

.hero{padding:14px 20px 10px;}
.hero .eyebrow{display:inline-block;font-size:11.5px;font-weight:700;color:#fff;background:var(--teal);padding:4px 10px;border-radius:3px;letter-spacing:.06em;}
.hero h1{font-size:28px;font-weight:800;margin-top:10px;color:var(--ink);}
.hero p.lead{font-size:13.5px;color:var(--ink-soft);margin-top:8px;line-height:1.55;}
.progress-pill{margin-top:14px;display:flex;align-items:center;gap:10px;background:var(--paper-card);border:1px solid var(--line);border-radius:12px;padding:10px 14px;}
.progress-pill .num{font-family:'Nanum Myeongjo',serif;font-weight:800;font-size:20px;color:var(--teal-deep);}
.progress-bar-bg{flex:1;height:6px;background:var(--line);border-radius:4px;overflow:hidden;}
.progress-bar-fg{height:100%;background:var(--teal);border-radius:4px;transition:width .4s;}

.group{padding:6px 18px 4px;}
.group-head{display:flex;align-items:baseline;gap:8px;margin:22px 0 10px;padding:0 2px;}
.group-head .dot{width:10px;height:10px;border-radius:50%;flex:0 0 auto;}
.group-head h2{font-size:17px;font-weight:700;color:var(--ink);}
.group-head .range{font-size:11.5px;color:var(--ink-soft);font-weight:500;margin-left:auto;}

.cardlist{display:flex;flex-direction:column;gap:10px;}
.tcard{position:relative;display:flex;align-items:center;gap:12px;background:var(--paper-card);border:1px solid var(--line);border-radius:14px;padding:13px 14px;cursor:pointer;text-align:left;width:100%;transition:transform .12s;overflow:hidden;}
.tcard:active{transform:scale(.985);}
.tcard .num{font-family:'Nanum Myeongjo',serif;font-weight:800;font-size:22px;width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;color:#fff;flex:0 0 auto;}
.tcard .tx{flex:1;min-width:0;}
.tcard .tx .ttl{font-size:14.5px;font-weight:700;color:var(--ink);line-height:1.35;}
.tcard .tx .sub{font-size:11.5px;color:var(--ink-soft);margin-top:3px;}
.tcard .chev{color:var(--ink-soft);font-size:16px;flex:0 0 auto;}
.stamp-mini{position:absolute;right:10px;top:8px;border:2px solid var(--vermilion);color:var(--vermilion);border-radius:6px;font-size:9.5px;font-weight:800;padding:2px 5px;transform:rotate(-9deg);letter-spacing:.05em;opacity:.92;background:rgba(184,68,44,.06);}

.topic-head{padding:6px 20px 4px;}
.topic-head .badge{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;font-weight:700;color:var(--ink-soft);}
.topic-head .badge b{color:#fff;background:var(--ink);border-radius:5px;padding:2px 7px;font-family:'Nanum Myeongjo',serif;}
.topic-head h1{font-size:22px;font-weight:800;margin-top:8px;}
.topic-head .period{font-size:12px;color:var(--ink-soft);margin-top:5px;}

.summary{padding:6px 20px 110px;}
.summary h4{font-size:14.5px;font-weight:700;color:var(--teal-deep);margin:22px 0 8px;display:flex;align-items:center;gap:8px;}
.summary h4::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--teal);}
.summary p{font-size:14px;line-height:1.85;color:var(--ink);margin:0 0 10px;}
mark{background:var(--ochre-soft);color:var(--ink);padding:.05em .2em;border-radius:3px;font-weight:700;box-decoration-break:clone;-webkit-box-decoration-break:clone;}
.summary .note{margin-top:14px;border-left:3px solid var(--vermilion);background:rgba(184,68,44,.06);padding:10px 12px;font-size:12.8px;color:var(--ink);border-radius:0 8px 8px 0;}

.fab-wrap{position:fixed;left:50%;bottom:0;transform:translateX(-50%);width:100%;max-width:560px;padding:14px 20px 22px;background:linear-gradient(180deg, rgba(238,241,230,0), var(--paper) 35%);display:flex;justify-content:center;z-index:25;}
.fab{width:100%;background:var(--teal);color:#fff;border:none;border-radius:14px;padding:15px;font-size:15.5px;font-weight:700;cursor:pointer;box-shadow:0 8px 20px rgba(18,63,58,.28);display:flex;align-items:center;justify-content:center;gap:8px;}
.fab:active{transform:scale(.98);}

.quiz-progress{padding:8px 20px 2px;}
.qp-row{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:7px;}
.qp-row .lbl{font-size:12.5px;color:var(--ink-soft);font-weight:600;}
.qp-row .lbl b{color:var(--teal-deep);font-size:14px;}
.qp-bar-bg{height:6px;border-radius:4px;background:var(--line);overflow:hidden;}
.qp-bar-fg{height:100%;background:var(--vermilion);border-radius:4px;transition:width .35s;}

.qcard{margin:16px 18px 0;background:var(--paper-card);border:1px solid var(--line);border-radius:16px;padding:18px 16px 20px;}
.qtype{display:inline-block;font-size:10.5px;font-weight:800;letter-spacing:.05em;color:#fff;border-radius:5px;padding:3px 8px;margin-bottom:10px;}
.qtype.mc{background:var(--teal);}
.qtype.short{background:var(--vermilion);}
.qtext{font-size:16px;font-weight:700;line-height:1.55;color:var(--ink);margin-bottom:14px;}

.opt{display:block;width:100%;text-align:left;background:#fff;border:1.5px solid var(--line);border-radius:11px;padding:13px 14px;margin-bottom:9px;font-size:14px;color:var(--ink);cursor:pointer;line-height:1.5;transition:border-color .15s, background .15s;}
.opt:active{transform:scale(.99);}
.opt.correct{border-color:var(--good);background:rgba(47,122,79,.1);font-weight:700;}
.opt.wrong{border-color:var(--bad);background:rgba(184,68,44,.1);}
.opt[disabled]{cursor:default;}

textarea.shortbox{width:100%;min-height:88px;border:1.5px solid var(--line);border-radius:11px;padding:12px;font-size:14px;font-family:inherit;color:var(--ink);background:#fff;resize:vertical;}
.kwbox{margin-top:14px;border-top:1px dashed var(--line);padding-top:12px;}
.kwbox .modelans{font-size:13.5px;line-height:1.7;color:var(--ink);background:rgba(29,107,99,.07);border-radius:9px;padding:10px 12px;margin-bottom:10px;}
.kwchips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px;}
.kwchip{font-size:11.5px;font-weight:700;color:var(--teal-deep);background:var(--ochre-soft);border-radius:20px;padding:4px 10px;}
.selfcheck{display:flex;gap:8px;}
.scbtn{flex:1;border-radius:10px;padding:11px;font-size:13.5px;font-weight:700;border:1.5px solid var(--line);background:#fff;cursor:pointer;}
.scbtn.yes{border-color:var(--good);color:var(--good);}
.scbtn.no{border-color:var(--bad);color:var(--bad);}

.explain{margin-top:12px;font-size:13px;line-height:1.65;color:var(--ink-soft);background:rgba(32,36,31,.045);border-radius:9px;padding:10px 12px;}
.nextbar{padding:16px 18px 8px;}
.nextbtn{width:100%;background:var(--ink);color:#fff;border:none;border-radius:13px;padding:15px;font-size:15px;font-weight:700;cursor:pointer;}
.nextbtn[disabled]{background:#c9cdc2;cursor:default;}

.result{padding:40px 24px 30px;text-align:center;}
.seal{width:128px;height:128px;margin:0 auto 18px;border:5px solid var(--vermilion);border-radius:20px;display:flex;align-items:center;justify-content:center;transform:rotate(-7deg);color:var(--vermilion);}
.seal span{font-family:'Nanum Myeongjo',serif;font-weight:800;font-size:21px;letter-spacing:.08em;}
.result .score{font-family:'Nanum Myeongjo',serif;font-size:42px;font-weight:800;color:var(--teal-deep);margin:6px 0 2px;}
.result .scorelbl{font-size:13px;color:var(--ink-soft);margin-bottom:18px;}
.breakdown{display:flex;justify-content:center;gap:18px;margin-bottom:26px;}
.bd-item{font-size:12.5px;color:var(--ink-soft);}
.bd-item b{display:block;font-size:18px;color:var(--ink);font-family:'Nanum Myeongjo',serif;}
.resbtns{display:flex;flex-direction:column;gap:10px;}
.resbtn{border-radius:13px;padding:14px;font-size:14.5px;font-weight:700;cursor:pointer;border:none;}
.resbtn.primary{background:var(--teal);color:#fff;}
.resbtn.ghost{background:var(--paper-card);border:1.5px solid var(--line);color:var(--ink);}
.footer-note{padding:30px 22px 10px;font-size:11px;color:var(--ink-soft);text-align:center;line-height:1.6;}
</style>
</head>
<body>
<div id="app"></div>
<script>
/* ===================== 데이터 (이후 채워짐) ===================== */
const TOPICS = [
{
  id:'t01', num:'01', group:'A', period:'구석기 ~ 철기 시대', range:'p.8~11',
  title:'선사 문화가 발달하고 국가가 출현하다',
  summary:`
  <h4>구석기 시대</h4>
  <p>한반도와 주변 지역의 구석기 시대는 <mark>수십만 년 전</mark>에 시작되었다. 구석기인은 빙하기와 간빙기가 반복되는 환경에 적응하며 <mark>주먹도끼·찍개·긁개 등의 뗀석기</mark>를 만들어 사냥과 채집을 하였고, 무리를 지어 <mark>이동 생활</mark>을 하며 동굴이나 막집에서 거주하였다. 빙하기가 끝날 즈음 큰 동물이 사라지고 작고 빠른 동물이 늘자, 이를 사냥하기 위해 <mark>슴베찌르개 같은 이음 도구</mark>나 활을 만들어 사용하였다.</p>
  <h4>신석기 시대</h4>
  <p>약 <mark>1만 년 전</mark> 자연환경이 오늘날과 비슷해지면서 신석기 시대가 시작되었다. 여전히 사냥과 채집을 하였지만 점차 <mark>농사를 짓고 동물을 길들이기</mark> 시작하였다. 돌보습·돌낫·갈돌과 갈판 등의 <mark>간석기</mark>를 만들고, <mark>빗살무늬 토기</mark>로 곡물을 저장·조리하였으며, 가락바퀴와 뼈바늘로 옷을 지었다. 농경과 목축이 본격화되면서 강가나 바닷가에 <mark>움집</mark>을 짓고 정착 생활을 하는 <mark>부족 사회</mark>가 등장하였고, 공동으로 생산·소비하는 평등한 사회였다.</p>
  <h4>계급이 분화하고 국가가 출현하다 (청동기 시대)</h4>
  <p>기원전 1500년 무렵 시작된 청동기 시대에는 농경이 발달하면서 <mark>잉여 생산물</mark>이 발생하였고, 이를 사유화하는 사람이 나타나면서 <mark>계급이 분화</mark>되어 권력을 가진 <mark>군장</mark>이 등장하였다. 청동기(비파형 동검, 청동 거울)는 원료가 귀해 주로 지배층이 의례용으로 사용했고, 농기구는 여전히 돌·나무(반달 돌칼)였다. 군장이 죽으면 그의 권력을 상징하는 거대한 <mark>고인돌</mark>을 만들었으며, 세력이 강한 부족이 주변을 통합하며 <mark>국가가 출현</mark>하였다. <mark>고조선</mark>은 이 시기 등장한 우리 역사상 최초의 국가이다.</p>
  <h4>철기 시대</h4>
  <p>기원전 5세기경 철기 시대가 되자 철광석으로 만든 <mark>철제 농기구</mark>가 보급되어 농업 생산력이 증가하였고, <mark>철제 무기</mark>의 사용으로 정복 전쟁이 활발해지면서 <mark>부여, 고구려, 삼한</mark> 등 여러 나라가 성장하였다.</p>
  <div class="note">특집: <b>반구대 암각화(울산)</b> — 신석기~청동기 시대에 걸쳐 새겨졌으며, 초기에는 사슴, 이후 고래·거북, 나중에는 호랑이·표범 등이 새겨졌다. 고기잡이와 사냥의 성공을 기원한 것으로 보이며, 300여 점 중 58점이 고래 그림이다.</div>
  `,
  quiz:[
    {type:'mc', q:'구석기 시대 사람들의 생활 모습으로 옳지 않은 것은?', choices:['뗀석기를 만들어 사용하였다','무리를 지어 이동 생활을 하였다','동굴이나 막집에서 거주하였다','농사를 짓고 가축을 기르기 시작하였다'], answer:3, explain:'농경과 목축의 시작은 신석기 시대의 특징이다. 구석기인은 뗀석기로 사냥·채집을 하며 이동 생활을 하였다.'},
    {type:'mc', q:'다음 유물이 처음 사용된 시대는? — "아랫부분이 뾰족하고 빗살무늬가 새겨진 토기"', choices:['구석기 시대','신석기 시대','청동기 시대','철기 시대'], answer:1, explain:'빗살무늬 토기는 신석기 시대에 곡물을 저장·조리하기 위해 만들어졌다.'},
    {type:'mc', q:'신석기 시대의 사회 모습으로 옳은 것은?', choices:['강가나 바닷가에 움집을 짓고 정착 생활을 하였다','권력을 가진 군장이 등장하였다','철제 무기로 정복 전쟁이 활발해졌다','반달 돌칼 대신 청동 농기구를 사용하였다'], answer:0, explain:'신석기인은 농경·목축이 본격화되면서 움집을 짓고 정착 생활을 하는 부족 사회를 이루었다.'},
    {type:'mc', q:'청동기 시대에 계급이 분화된 직접적 배경으로 가장 적절한 것은?', choices:['농경 발달로 발생한 잉여 생산물의 사유화','뗀석기 사용의 확산','한 군현의 설치','신석기인의 평등한 분배 전통 강화'], answer:0, explain:'농경 발달 → 잉여 생산물 발생 → 사유화 → 계급 분화 → 군장 등장의 과정으로 국가가 출현하였다.'},
    {type:'mc', q:'고인돌에 대한 설명으로 옳은 것은?', choices:['신석기 시대 평등 사회의 산물이다','청동기 시대 지배층(군장)의 권력을 상징하는 무덤이다','한 군현 설치 이후 유행한 무덤이다','삼한의 소도에서만 발견된다'], answer:1, explain:'고인돌은 청동기 시대 군장의 권력을 보여 주는 무덤으로, 비파형 동검과 함께 고조선의 문화 범위를 추정하는 자료가 된다.'},
    {type:'mc', q:'철기 시대에 새롭게 성장한 나라로 옳지 않은 것은?', choices:['부여','고구려','삼한','발해'], answer:3, explain:'부여, 고구려, 삼한 등은 철기 시대(기원전 5세기경 이후)에 성장하였다. 발해는 이보다 훨씬 뒤인 698년에 건국되었다.'},
    {type:'mc', q:'반구대 암각화에 대한 설명으로 옳은 것은?', choices:['고려 시대에 처음 새겨졌다','고래·사슴 등을 새겨 고기잡이와 사냥의 성공을 기원하였다','오직 호랑이만 새겨져 있다','청동기 시대에만 새겨졌다'], answer:1, explain:'반구대 암각화는 신석기~청동기 시대에 걸쳐 새겨졌으며 사슴, 고래, 호랑이 등이 표현되어 있다.'},
    {type:'short', q:'청동기 시대에 계급이 분화되고 국가가 출현하게 된 과정을 서술하시오.', keywords:['잉여 생산물','사유화','계급 분화','군장'], model:'농경이 발달하면서 잉여 생산물이 발생하자 이를 사유화하는 사람들이 나타났다. 그 결과 계급이 분화되었고, 권력을 가진 군장이 등장하여 주변 부족을 통합하면서 국가가 출현하였다.'},
    {type:'short', q:'신석기 시대 사람들의 생활 모습을 농경과 주거 형태를 중심으로 서술하시오.', keywords:['농경과 목축','정착 생활','움집'], model:'신석기 시대 사람들은 농경과 목축을 시작하면서 강가나 바닷가에 움집을 짓고 정착 생활을 하였으며, 부족 사회를 이루어 평등하게 생산과 소비를 함께 하였다.'},
    {type:'short', q:'한반도에 등장한 우리 역사상 최초의 국가의 이름을 쓰시오.', keywords:['고조선'], model:'고조선'},
  ]
},
{

  summary:`

  <p>청동기 시대 정복 전쟁이 빈번해지며 권력을 가진 군장이 주변 부족을 통합해 나가는 과정에서 우리 역사상 최초의 국가인 <mark>고조선</mark>이 성립하였다. 고조선은 랴오닝 지방과 한반도 서북부 일대에서 발전하였고, 중국의 연과 맞설 정도로 성장하였으나 기원전 3세기 초 연의 공격으로 영토를 빼앗기기도 하였다. 왕 아래 상·대부·장군 등의 관직을 두었고, <mark>8조법</mark>을 만들어 사회 질서를 유지하였다.</p>
  <p>중국의 진·한 교체기에 <mark>위만</mark>을 비롯한 유민이 고조선으로 건너왔고, 위만은 고조선의 왕을 몰아내고 왕위를 차지하였다(기원전 194). 이후 고조선은 철기 문화를 받아들이고, 한과 주변국 사이에서 <mark>중계 무역</mark>으로 이익을 얻었다. 고조선이 흉노와 가까워지려 하자 한이 침략하였고, 고조선은 1년여 항쟁 후 내분으로 멸망하였다(기원전 108). 한은 옛 고조선 지역에 <mark>낙랑군 등 4개의 군현</mark>을 두어 통치하였다.</p>

  <p>옥저와 동예는 왕이 없이 읍군·삼로 등의 군장이 다스렸으며, 한 군현과 고구려의 압력으로 크게 성장하지 못하였다. 한반도 중남부에서는 고조선 유민과 토착 세력이 결합하여 마한·진한·변한의 <mark>삼한</mark>이 형성되었다. 마한의 목지국이 가장 강력하여 삼한을 대표하였다. 각 소국은 신지·읍차 등의 군장이 통치하고, <mark>천군</mark>이 제사를 주관하며 <mark>소도</mark>라는 신성 지역이 존재하여 삼한이 <mark>제정 분리 사회</mark>였음을 보여 준다.</p>
  `,
  quiz:[

  summary:`

  summary:`
  <h4>문벌, 권력을 독점하다</h4>
  <p>거란과의 전쟁(서희, 강감찬) 이후 평화가 안정되며 여러 대에 걸쳐 고위 관료를 배출한 <mark>문벌</mark>이 성장하였다. 이들은 왕실·문벌과 혼인하고 과거와 음서로 요직을 독점하였다(대표적으로 경원 이씨). 문벌의 권력 독점으로 신진 세력의 정치 참여가 줄고 불법적 토지 탈취 등 문제가 발생하자 숙종은 신진 세력을 등용해 견제하였다.</p>
  <h4>여진을 정벌하고 동북 9성을 설치하다</h4>
  <p>여진이 성장하여 고려를 위협하자 숙종은 윤관의 건의로 <mark>별무반</mark>을 조직하였다. 예종 때 윤관이 별무반으로 여진을 정벌하고 <mark>동북 9성</mark>을 설치했으나(1107), 방어가 어려워 여진의 요청으로 다시 돌려주었다(1109).</p>
  <h4>이자겸의 난과 금에 대한 사대</h4>
  <p>여진이 <mark>금</mark>을 건국(1115)하고 거란을 멸망시킨 후 고려에 사대를 요구하였다. 당시 막강한 권력을 가졌던 <mark>이자겸</mark>이 자신을 제거하려는 인종에 반발해 난을 일으켰고(1126), 이후 전쟁을 피하고 권력을 유지하려 금의 사대 요구를 수용하였다. 이는 고려 왕의 위상을 약화시켰다.</p>
  <h4>묘청, 서경 천도 운동을 추진하다</h4>
  <p>인종은 왕권 회복을 위해 묘청 등 서경 세력을 등용해 칭제건원·금 정벌·<mark>서경 천도</mark>를 추진하였으나 김부식 등 개경 세력의 반대로 좌절되자 묘청이 반란을 일으켰다(<mark>서경 천도 운동</mark>, 1135). 김부식이 이끄는 관군에 의해 1년 만에 진압되었다.</p>
  <h4>무신들이 권력을 장악하다</h4>
  <p>문신 중심 체제 속 무신에 대한 차별이 심해지자 정중부, 이의방 등이 <mark>무신 정변</mark>을 일으켰다(1170). 무신들의 회의 기구인 <mark>중방</mark>을 중심으로 정치가 운영되었으나 권력 다툼으로 혼란하였다. <mark>최충헌</mark>이 집권하면서 안정되었는데, 그는 <mark>교정도감</mark>을 설치해 권력을 행사하였고 아들 최우는 <mark>정방</mark>으로 인사권을 장악하였다. 무신 정권기 권력자들의 대농장 확대로 국가 재정이 악화되고 신분 질서가 흔들리며 망이·망소이의 난(1176), 김사미·효심의 난(1193), <mark>만적의 난</mark>(1198) 등 농민·천민 봉기가 잇따랐다.</p>
  `,
  quiz:[
    {type:'mc', q:'고려 문벌이 권력을 독점할 수 있었던 방법으로 옳은 것은?', choices:['왕실·문벌 간 혼인, 과거와 음서를 통한 관직 독점','노비안검법 실시','무신 정변 주도','삼별초 결성'], answer:0, explain:'문벌은 왕실이나 다른 문벌과 혼인 관계를 맺고 과거와 음서를 통해 요직을 독점하며 세력을 키웠다.'},

    {type:'mc', q:'최충헌이 설치한 국정 총괄 최고 권력 기구는?', choices:['교정도감','정방','중방','도병마사'], answer:0, explain:'최충헌은 교정도감을 설치하여 국정을 총괄하는 막강한 권력을 행사하였다.'},
    {type:'mc', q:'무신 정권기에 일어난 봉기로 옳은 것은?', choices:['망이·망소이의 난, 만적의 난','이자겸의 난','서경 천도 운동','임오군란'], answer:0, explain:'무신 정권기에는 특수 행정 구역민의 망이·망소이의 난, 신분 해방을 도모한 만적의 난 등이 일어났다.'},

  title:'원의 간섭 속에서 개혁을 시도하다',
  summary:`
  <h4>몽골의 침략에 맞서다</h4>
  <p>몽골 사신 피살을 구실로 몽골이 고려를 침략하자(1231) 최우는 <mark>강화도</mark>로 천도하여 장기 항전을 준비하였다. 처인성에서는 김윤후가 몽골 장수 살리타를 사살하는 등 약 30년간 항쟁하였으나, 결국 몽골과 강화하였다(1259). 고려 왕실은 원 황실과 혼인하여 <mark>부마국</mark>이 되었고, 개경으로 환도하자(1270) 무신 정권의 군사 기반이었던 <mark>삼별초</mark>가 이에 반대하여 항쟁하다 진압되었다.</p>
  <h4>원의 간섭으로 통치 체제가 바뀌다</h4>
  <p>원은 고려의 왕실 용어와 관제를 격하시켰다(조·종→충0왕, 6부→4사 등). 국정은 <mark>도평의사사</mark>에서 논의하였고, 일본 침략을 위해 설치된 <mark>정동행성</mark>은 이후에도 존속하며 고려 왕이 그 승상을 겸하는 이중적 지위를 가졌다.</p>
  <h4>원 간섭기, 고려 사회가 변화하다</h4>
  <p>고려는 원의 일본 침략에 동원되었고, 공녀와 환관이 끌려갔으며 응방이 설치되었다. 몽골풍과 고려양이 유행하였다. 친원적 성향의 <mark>권문세족</mark>이 지배층이 되어 도평의사사와 정방을 장악하고 불법적으로 토지와 노비를 늘려 농장을 확대하였고, 이는 농민의 몰락과 국가 재정 위기로 이어졌다.</p>
  <h4>공민왕이 개혁을 추진하다</h4>
  <p>원이 쇠퇴하자 <mark>공민왕</mark>은 친원 세력을 숙청하고 정동행성 이문소를 폐지하며 <mark>쌍성총관부</mark>를 공격해 옛 영토를 되찾았다. 신돈을 책임자로 한 <mark>전민변정도감</mark>을 설치하여 권문세족이 빼앗은 토지를 돌려주고 노비를 해방하였으며 정방을 폐지하였다. 그러나 홍건적·왜구의 침략과 권문세족의 반발 속에 신돈이 제거되고 공민왕이 시해되면서 개혁이 중단되었다.</p>
  <h4>신진 사대부의 성장과 조선 건국</h4>
  <p>성리학을 수용한 <mark>신진 사대부</mark>가 성균관을 중심으로 성장하여 친명 배원을 주장하고 권문세족을 비판하였다. 홍건적과 왜구를 격퇴하며 성장한 이성계 등 신흥 무인 세력과 결합하여 <mark>위화도 회군</mark>(1388)으로 실권을 잡고 <mark>과전법</mark>을 시행하였다. 이후 고려 왕조 유지를 주장한 온건파(이색, 정몽주)와 새 왕조 건국을 주장한 급진파(정도전, 조준)로 분열하였고, 급진파가 이성계를 왕으로 추대하여 <mark>조선을 건국</mark>하였다(1392).</p>
  `,

    {type:'mc', q:'공민왕이 추진한 반원 개혁 정책으로 옳은 것은?', choices:['쌍성총관부 공격, 전민변정도감 설치','노비안검법 실시','위화도 회군','과전법 시행'], answer:0, explain:'공민왕은 쌍성총관부를 공격해 영토를 회복하고, 전민변정도감을 설치해 권문세족이 빼앗은 토지·노비를 되돌렸다.'},
    {type:'mc', q:'위화도 회군을 계기로 실권을 잡은 인물은?', choices:['정몽주','이성계','정도전','최영'], answer:1, explain:'요동 정벌에 반대한 이성계는 위화도에서 군대를 돌려 우왕과 최영을 몰아내고 국정을 장악하였다(1388).'},

{
  id:'t22', num:'22', group:'C', period:'1840~1876', range:'p.108~111',
  title:'국제 질서의 변화 속에 조선이 개항하다',
  summary:`
  <h4>청과 일본이 개항하다</h4>
  <p>영국은 청과의 무역 적자를 해소하려 아편을 밀수출하다 청이 이를 금지하자 <mark>아편 전쟁</mark>을 일으켰고, 청은 패배하여 <mark>난징 조약</mark>을 맺고 개항하였다. 미국은 무력시위로 일본을 압박해 <mark>미일 화친 조약, 미일 수호 통상 조약</mark>을 맺게 하였다. 이 조약들은 거류지 설치, 최혜국 대우, 영사 재판권, 협정 관세를 포함한 <mark>불평등 조약</mark>이었다.</p>
  <h4>조선, 서양의 통상 요구를 거부하다</h4>
  <p>프랑스는 병인박해를 구실로 강화도를 침략했으나(<mark>병인양요</mark>, 1866) 한성근·양헌수의 활약으로 물리쳤다. 1868년 오페르트 도굴 사건으로 반감이 커졌고, 1871년 미국이 침략하자(<mark>신미양요</mark>) 어재연이 광성보에서 항전하였다. 이후 조선 정부는 전국에 <mark>척화비</mark>를 세워 통상 거부 의지를 밝혔으나, 오경석·박규수 등은 문호 개방을 주장하였다.</p>
  <h4>강화도 조약이 체결되다</h4>
  <p>일본 군함 운요호가 강화도·영종도를 불법 침입한 <mark>운요호 사건</mark>(1875)을 계기로 일본이 개항을 요구하였고, 조선은 1876년 일본과 <mark>강화도 조약(조일 수호 조규)</mark>을 체결하였다. 이는 조선이 외국과 맺은 최초의 근대적 조약으로 조선이 자주국임을 명시하였으나, 부산·원산·인천 개항과 함께 일본의 <mark>영사 재판권과 해안 측량권</mark>을 인정한 불평등 조약이었다. 후속 조약에서는 일본 화폐 유통을 허용하고 관세 규정 없이 양곡 수출을 제한하지 않아 <mark>무관세 무역과 쌀의 무제한 유출</mark> 문제가 발생하였다.</p>

  summary:`
  <h4>임오군란 후 청의 간섭과 개화파의 분화</h4>
  <p>임오군란 진압 후 청은 군대를 주둔시키며 내정에 간섭하였고, 일본은 <mark>제물포 조약</mark>으로 배상금과 공사관 주둔을 얻어냈다. 개화 세력은 청에 대한 태도를 두고 <mark>온건 개화파</mark>(김홍집, 김윤식 — 동도서기론, 점진적 개화)와 <mark>급진 개화파</mark>(김옥균, 박영효 — 문명개화론, 급진적 개화)로 나뉘었다.</p>
  <h4>갑신정변</h4>
  <p>차관 도입 실패로 궁지에 몰린 급진 개화파는 청군이 베트남 문제로 병력을 이동시킨 것을 기회로 삼아, 일본의 지원을 약속받고 우정총국 개국 축하 연회를 이용해 <mark>갑신정변</mark>을 일으켰다(1884). 개화당 정부는 청에 대한 사대 관계 폐지, 문벌 폐지, 내각제 수립 등의 <mark>개혁 정강</mark>을 발표했으나, 청군의 개입으로 <mark>3일천하</mark>로 끝났다.</p>
  <h4>갑신정변의 영향</h4>
  <p>갑신정변은 소수 개화파 중심으로 진행되어 <mark>민중의 지지를 얻지 못하였고</mark>, 조선은 개화의 동력을 잃고 청에 더 예속되었다. 일본은 조선과 <mark>한성 조약</mark>(배상금, 공사관 신축비)을, 청과는 <mark>톈진 조약</mark>(양국 군대 철수, 파병 시 사전 통보)을 맺었다.</p>
  <h4>거문도 사건</h4>
  <p>갑신정변 이후 고종이 러시아를 끌어들이자 영국이 러시아의 남하를 견제한다는 구실로 <mark>거문도</mark>를 불법 점령하였다(1885). 이는 조선이 열강의 각축장이 될 수 있음을 보여 준 사건이었다. 유길준은 <mark>중립화론</mark>을 제시했으나 수용되지 못하였다.</p>

  summary:`
  <h4>고부 농민 봉기와 1차 봉기</h4>
  <p>군수 조병갑의 수탈에 맞서 전봉준이 사발통문을 돌려 <mark>고부 농민 봉기</mark>(1894.1)를 일으켰다. 안핵사 이용태의 가혹한 탄압에 전봉준이 손화중과 함께 무장에서 <mark>1차 봉기</mark>(1894.3)를 일으켰고, 백산에서 "<mark>보국안민</mark>"의 깃발을 내걸며 4대 행동 강령을 발표하였다. 황토현·황룡촌 전투에서 승리하고 전주성을 점령하였다.</p>
  <h4>전주 화약과 집강소</h4>
  <p>정부가 청에 원병을 요청하자 톈진 조약에 따라 일본군도 상륙하였다. 상황이 급박해지자 농민군은 폐정 개혁과 신변 보장을 조건으로 정부와 <mark>전주 화약</mark>을 맺고 해산하였다(1894.5). 이후 농민군은 전라도 각지에 <mark>집강소</mark>를 설치해 치안을 유지하며 폐정 개혁을 자주적으로 실천하였다.</p>

  <p>일본이 경복궁을 침범하고 <mark>청일 전쟁</mark>을 일으켜 내정 간섭을 본격화하자 농민군은 일본군을 몰아내기 위해 다시 봉기하였다(<mark>2차 봉기</mark>, 1894.9). 전봉준의 남접군과 손병희의 북접군이 논산에 집결해 한성으로 진격했으나 <mark>우금치 전투</mark>(1894.11)에서 일본군·관군 연합 부대에 패배하였고, 전봉준 등 지도자들이 체포되며 막을 내렸다.</p>

  <p>동학 농민 운동은 민중이 동학 조직과 결합하여 아래에서부터 사회를 개혁하고 외세에 맞서 싸운 운동이었다. 농민군의 <mark>폐정 개혁 요구는 갑오개혁에 반영</mark>되었고, 일부는 항일 의병에 가담하였다.</p>

{
  id:'t26', num:'26', group:'C', period:'1894~1896', range:'p.128~131',
  title:'갑오개혁, 근대 국가의 발판을 마련하다',
  summary:`
  <h4>군국기무처와 갑오개혁(1차)</h4>
  <p>일본이 경복궁을 무력 침범하고 <mark>청일 전쟁</mark>을 일으키자 김홍집 내각이 수립되고 <mark>군국기무처</mark>가 설치되어 독자적인 개혁을 추진하였다(<mark>갑오개혁</mark>, 1894). 신분 차별과 <mark>노비제를 폐지</mark>해 평등 사회로 나아가는 발판을 마련하였고, 중국 연호 사용을 폐지하였으며 왕실과 국가의 사무를 구분하였다.</p>
  <h4>2차 개혁과 홍범 14조</h4>
  <p>일본의 간섭이 심화되며 김홍집·박영효 연립 내각이 사법·지방 행정 제도를 개편하였다. 고종은 자주독립을 선포하고 개혁의 방향을 밝힌 <mark>홍범 14조</mark>를 반포했으며, 근대 교육 제도 도입을 위한 <mark>교육입국 조서</mark>를 발표하였다. 정치적으로는 의정부 폐지·내각제 시행, 과거제 폐지, 23부 개편이, 사회적으로는 과부의 재가 허용·조혼 금지·고문과 연좌제 폐지가, 경제적으로는 탁지아문 재정 일원화와 조세 금납화가 이루어졌다.</p>
  <h4>삼국 간섭과 을미사변</h4>
  <p>청일 전쟁에서 승리한 일본이 <mark>시모노세키 조약</mark>으로 랴오둥반도를 얻었으나 러시아·프랑스·독일의 <mark>삼국 간섭</mark>으로 청에 반환하였다. 고종과 왕비가 러시아에 접근하자 일본은 군인과 낭인을 동원해 명성 황후를 살해하였다(<mark>을미사변</mark>, 1895).</p>

  <p>아관 파천 중 이권이 열강에 넘어가자 서재필이 <mark>독립신문</mark>을 창간하였다(1896). 곧이어 <mark>독립 협회</mark>가 창립되어 독립문을 세우고 정기적인 토론회를 열어 민권 의식과 독립 의식을 고취하였다.</p>

  title:'일본의 침략으로 국권을 빼앗기다',
  summary:`
  <h4>러일 전쟁과 국권 침탈의 시작</h4>
  <p>영일 동맹을 맺은 일본은 <mark>러일 전쟁</mark>(1904)을 일으켰다. 고종의 중립 선언을 무시하고 <mark>한일 의정서</mark>를 강요해 전쟁 지역을 마음대로 사용했고, <mark>제1차 한일 협약</mark>으로 재정 고문(메가타)·외교 고문(스티븐스)을 파견하였다. 일본은 영국·미국에 이어 러시아로부터도(포츠머스 조약) 한국 지배를 인정받았다.</p>
  <h4>을사늑약</h4>
  <p>1905년 일본은 무력으로 <mark>을사늑약(제2차 한일 협약)</mark> 체결을 강요해 한국의 외교권을 빼앗고 한성에 <mark>통감</mark>을 설치하였다(초대 통감 이토 히로부미). 열강은 공사관을 철수시켰고, 한국은 독립국 지위를 상실하였다.</p>
  <h4>국권 피탈 과정</h4>

  <h4>독도와 간도</h4>

  summary:`
  <h4>일본의 경제 침탈</h4>
  <p>아관 파천 이후 열강이 최혜국 대우를 내세워 이권을 차지하였고, 일본은 철도 부지·군용지를 빼앗고 1908년 <mark>동양 척식 주식회사</mark>를 세웠다. 재정 고문 메가타가 추진한 <mark>화폐 정리 사업</mark>(1905)으로 백동화가 일본 제일 은행권으로 교환되며 화폐 부족(전황)이 발생해 한국인 상공업자가 큰 피해를 입었고, 일본은 막대한 차관을 강요하였다.</p>
  <h4>경제적 구국 운동</h4>
  <p>조선 상인은 상회사를 설립하고 <mark>황국 중앙 총상회</mark>를 조직해 상권을 수호하려 하였다. 1907년 대구에서 김광제·서상돈의 발의로 시작된 <mark>국채 보상 운동</mark>은 각계각층의 호응을 얻었으나 통일된 지휘 체계 부재와 일제의 탄압으로 중단되었다.</p>
  <h4>애국 계몽 운동</h4>
  <p>사회 진화론에 영향을 받은 지식인들이 실력 양성으로 국권을 수호하려는 애국 계몽 운동을 펼쳤다. <mark>보안회</mark>(1904)는 일본의 황무지 개간권 요구를 철회시켰고, 헌정 연구회(1905)를 계승한 <mark>대한 자강회</mark>(1906)는 언론·교육·산업 진흥을 강조하였다. <mark>대한매일신보</mark>는 베델을 발행인으로 내세워 일본의 검열을 피하며 국채 보상 운동을 주도하였다.</p>
  <h4>신민회</h4>
  <p>안창호, 양기탁 등이 조직한 <mark>신민회</mark>(1907)는 공화정에 바탕을 둔 근대 국가 건설을 목표로 한 비밀 결사로, 대성 학교·오산 학교로 민족 교육을 실시하고 남만주 삼원보에 독립운동 기지를 건설하였다. 신민회의 국내 조직은 일제가 날조한 <mark>105인 사건</mark>(1911)으로 와해되었다.</p>

/* ===================== 유틸 ===================== */
function shuffle(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}
function buildQuizSession(topic){
  const items = shuffle(topic.quiz).map(q=>{
    if(q.type==='mc'){
      const order = shuffle(q.choices.map((c,i)=>i));
      const choices = order.map(i=>q.choices[i]);
      const answer = order.indexOf(q.answer);
      return {type:'mc', q:q.q, choices, answer, explain:q.explain, picked:null, done:false};
    }
    return {type:'short', q:q.q, keywords:q.keywords, model:q.model, revealed:false, marked:null, done:false};
  });
  return {topicId:topic.id, idx:0, items};
}
const GROUP_INFO = {
  A:{name:'1부 · 선사 시대 ~ 고조선', range:'p.6~13', color:'var(--A)'},
  B:{name:'2부 · 고려의 성립과 변동', range:'p.22~33', color:'var(--B)'},
  C:{name:'3부 · 근대 국가 수립의 노력', range:'p.108~151', color:'var(--C)'},
};

const App = {
  state:{view:'home', topicId:null, quiz:null, completed:{}},
  init(){ this.render(); },
  topicById(id){ return TOPICS.find(t=>t.id===id); },

  goHome(){ this.state.view='home'; this.state.topicId=null; this.state.quiz=null; this.render(); window.scrollTo(0,0); },
  openTopic(id){ this.state.view='topic'; this.state.topicId=id; this.render(); window.scrollTo(0,0); },
  startQuiz(id){
    const t = this.topicById(id);
    this.state.view='quiz';
    this.state.quiz = buildQuizSession(t);
    this.render(); window.scrollTo(0,0);
  },
  retryQuiz(){ this.startQuiz(this.state.quiz.topicId); },

  selectMC(choiceIdx){
    const q = this.state.quiz.items[this.state.quiz.idx];
    if(q.done) return;
    q.picked = choiceIdx; q.done = true;
    this.render();
  },
  revealShort(){
    const q = this.state.quiz.items[this.state.quiz.idx];
    q.revealed = true; this.render();
  },
  markShort(correct){
    const q = this.state.quiz.items[this.state.quiz.idx];
    q.marked = correct; q.done = true; this.render();
  },
  next(){
    const quiz = this.state.quiz;
    if(quiz.idx < quiz.items.length-1){ quiz.idx++; this.render(); window.scrollTo(0,0); }
    else { this.finish(); }
  },
  finish(){
    const quiz = this.state.quiz;
    let mcTotal=0, mcCorrect=0, shortTotal=0, shortCorrect=0;
    quiz.items.forEach(q=>{
      if(q.type==='mc'){ mcTotal++; if(q.picked===q.answer) mcCorrect++; }
      else { shortTotal++; if(q.marked) shortCorrect++; }
    });
    this.state.completed[quiz.topicId] = true;
    this.state.view='result';
    this.state.result = {mcTotal,mcCorrect,shortTotal,shortCorrect,total:mcTotal+shortTotal,score:mcCorrect+shortCorrect};
    this.render(); window.scrollTo(0,0);
  },

  render(){
    const app = document.getElementById('app');
    if(this.state.view==='home') app.innerHTML = this.renderHome();
    else if(this.state.view==='topic') app.innerHTML = this.renderTopic();
    else if(this.state.view==='quiz') app.innerHTML = this.renderQuiz();

    </div>
    ${groupsHtml}
    <div class="footer-note">총 ${total}개 주제 · 주제별 퀴즈 10문항(객관식 7 · 서술형 3)</div>
    `;
  },

  renderTopic(){
    const t = this.topicById(this.state.topicId);
    const info = GROUP_INFO[t.group];
    return `
    <div class="topbar"><button class="backbtn" onclick="App.goHome()">‹</button><span class="tb-title">${info.name}</span></div>
    <div class="topic-head">
      <span class="badge"><b>주제 ${t.num}</b>${t.range}</span>
      <h1>${t.title}</h1>
      <div class="period">${t.period}</div>
    </div>
    <div class="summary">${t.summary}</div>
    <div class="fab-wrap"><button class="fab" onclick="App.startQuiz('${t.id}')">✏️ 개념확인 퀴즈 풀기 (10문항)</button></div>
    `;
  },

  renderQuiz(){
    const quiz = this.state.quiz;
    const t = this.topicById(quiz.topicId);
    const q = quiz.items[quiz.idx];
    const n = quiz.items.length;
    const pct = ((quiz.idx)/n*100);
    let body = '';
    if(q.type==='mc'){
      const opts = q.choices.map((c,i)=>{
        let cls='opt';
        if(q.done){
          if(i===q.answer) cls+=' correct';
          else if(i===q.picked) cls+=' wrong';
        }
        return `<button class="${cls}" ${q.done?'disabled':''} onclick="App.selectMC(${i})">${c}</button>`;
      }).join('');
      const explain = q.done ? `<div class="explain">${q.explain}</div>` : '';
      body = `<span class="qtype mc">객관식</span><div class="qtext">${q.q}</div>${opts}${explain}`;
    } else {
      const reveal = q.revealed ? `
        <div class="kwbox">
          <div class="modelans"><b>예시 답안</b><br>${q.model}</div>
          <div class="kwchips">${q.keywords.map(k=>`<span class="kwchip">#${k}</span>`).join('')}</div>
          ${q.done ? `<div class="explain">${q.marked? '자기채점: 맞았어요 ✅' : '자기채점: 다시 학습할게요 🔁'}</div>` :
          `<div class="selfcheck">
            <button class="scbtn yes" onclick="App.markShort(true)">핵심어 다 썼어요 ✅</button>
            <button class="scbtn no" onclick="App.markShort(false)">놓쳤어요 🔁</button>
          </div>`}
        </div>` : `<button class="nextbtn" style="margin-top:6px;background:var(--vermilion)" onclick="App.revealShort()">정답 및 핵심어 확인</button>`;
      body = `<span class="qtype short">서술형·단답형</span><div class="qtext">${q.q}</div><textarea class="shortbox" placeholder="여기에 내 답을 적어보세요 (핵심어를 꼭 포함!)"></textarea>${reveal}`;
    }
    const canNext = q.done;
    return `
    <div class="topbar"><button class="backbtn" onclick="App.openTopic('${t.id}')">‹</button><span class="tb-title">${t.title}</span></div>
    <div class="quiz-progress">
      <div class="qp-row"><span class="lbl">진행도</span><span class="lbl"><b>${quiz.idx+1}</b> / ${n}</span></div>
      <div class="qp-bar-bg"><div class="qp-bar-fg" style="width:${pct}%"></div></div>
    </div>
    <div class="qcard">${body}</div>
    <div class="nextbar"><button class="nextbtn" ${canNext?'':'disabled'} onclick="App.next()">${quiz.idx===n-1 ? '결과 보기' : '다음 문제'}</button></div>
    `;
  },

  renderResult(){
    const r = this.state.result;
    const t = this.topicById(this.state.quiz.topicId);
    return `
    <div class="topbar"><button class="backbtn" onclick="App.openTopic('${t.id}')">‹</button><span class="tb-title">${t.title}</span></div>
    <div class="result">
      <div class="seal"><span>학습<br>완료</span></div>
      <div class="score">${r.score} / ${r.total}</div>
      <div class="scorelbl">‘${t.title}’ 개념확인 퀴즈 결과</div>
      <div class="breakdown">
        <div class="bd-item"><b>${r.mcCorrect}/${r.mcTotal}</b>객관식</div>
        <div class="bd-item"><b>${r.shortCorrect}/${r.shortTotal}</b>서술·단답</div>
      </div>
      <div class="resbtns">
        <button class="resbtn primary" onclick="App.retryQuiz()">다시 풀기</button>
        <button class="resbtn ghost" onclick="App.openTopic('${t.id}')">개념정리 다시 보기</button>
        <button class="resbtn ghost" onclick="App.goHome()">주제 목록으로</button>
      </div>
    </div>
    `;
  },
};
window.onload = () => App.init();
</script>
</body>
</html>
